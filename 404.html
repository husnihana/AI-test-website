<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found - Doc-Scribe Help Centre</title>

        <button class="language-button" type="button">English (US)</button>

        <h1 style="margin: 0 0 12px;">Page not found</h1>
        <p style="color: var(--muted); margin: 0 0 32px;">The page you are looking for does not exist or has been moved.</p>
        <a href="index.html" style="
          display: inline-block;
          background: var(--brand);
          color: #fff;
          padding: 12px 24px;

          text-decoration: none;
          font-size: 13px;
          font-weight: 600;">

      <div id="footer"></div>
    </main>

  <script src="sidebar.js"></script>
  <script src="footer.js"></script>
